name: flutter_app
description: "Flutter frontend for the Laravel food ordering project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.9.0
  file_picker: ^10.3.2
  go_router: ^16.2.1
  google_fonts: ^6.3.2
  intl: ^0.20.2
  provider: ^6.1.5+1
  qr_flutter: ^4.1.0
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/catalog/
